<!DOCTYPE html>
<html>
<head>
<title>Character Counter</title>

<style>

body{
    margin:0;
    padding:0;
    height:100vh;
color: rgb(0, 0, 0);
    display:flex;
    justify-content:center;
    align-items:center;
}

.outer{
    width:500px;
    height:300px;
    border:2px solid black;
    box-shadow:0 0 10px rgba(0,0,0,0.5);

    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:400px;
}

h2{
    text-align:center;
    color:blue;
}

textarea{
    width:100%;
    height:100px;
    box-sizing:border-box;
    padding:10px;

    border:2px solid black;
}

.counter{
    margin-top:10px;
    display:flex;
    justify-content:space-between;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="outer">

    <div class="container">

        <h2>Character Counter</h2>

        <textarea
            id="textArea"
            maxlength="100"
            placeholder="Type something..."
            onkeyup="countCharacters()"></textarea>

        <div class="counter">
            <span>
                Total Characters:
                <span id="total">0</span>
            </span>

            <span>
                Remaining:
                <span id="remaining">100</span>
            </span>
        </div>

    </div>

</div>

<script>

function countCharacters(){

    let text =
    document.getElementById("textArea").value;

    let totalCharacters = text.length;

    let remainingCharacters =
    100 - totalCharacters;

    document.getElementById("total").innerText =
    totalCharacters;

    document.getElementById("remaining").innerText =
    remainingCharacters;
}

</script>

</body>
</html>
