<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login UI</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    

    background:

    
    radial-gradient(
        circle at 0% 35%,
        rgba(56, 190, 225, 0.85) 0%,
        rgba(56, 190, 225, 0.35) 16%,
        rgba(56, 190, 225, 0.08) 28%,
        transparent 42%
    ),

    
    radial-gradient(
        circle at 15% 100%,
        rgba(255, 120, 170, 0.9) 0%,
        rgba(255, 120, 170, 0.30) 18%,
        transparent 40%
    ),

  
    radial-gradient(
        circle at 100% 100%,
        rgba(255, 228, 145, 0.95) 0%,
        rgba(255, 228, 145, 0.45) 18%,
        transparent 40%
    ),

    
    linear-gradient(
        135deg,
        #00135f 0%,
        #02005f 38%,
        #07004d 68%,
        #0a0148 100%
    );

    overflow:hidden;
}



.login-box{
    width:320px;
    text-align:center;
}



.avatar{
    width:92px;
    height:92px;

    margin:0 auto 34px;

    border-radius:50%;

    background:rgba(255,255,255,0.22);

    position:relative;
}


.avatar::before{
    content:"";

    position:absolute;

    width:28px;
    height:28px;

    background:#f3f3f3;

    border-radius:50%;

    top:18px;
    left:50%;

    transform:translateX(-50%);
}

.avatar::after{
    content:"";

    position:absolute;

    width:46px;
    height:34px;

    background:#f3f3f3;

    border-radius:50px 50px 18px 18px;

    bottom:15px;
    left:50%;

    transform:translateX(-50%);
}


.input-group{
    position:relative;
    margin-bottom:18px;
}

.input-group input{
    width:100%;
    height:34px;

    border:none;
    outline:none;

    background:#ececec;

    padding-left:42px;

    color:#555;
    font-size:13px;
}

.input-group input::placeholder{
    color:#8d8d8d;
}

.input-group i{
    position:absolute;

    left:14px;
    top:50%;

    transform:translateY(-50%);

    color:#3d5572;
    font-size:14px;
}


.options{
    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-top:3px;
    margin-bottom:28px;

    color:#d6d6d6;
    font-size:12px;
}

.options label{
    display:flex;
    align-items:center;
    gap:6px;
}

.options input{
    width:11px;
    height:11px;

    accent-color:#24344c;
}

.options a{
    text-decoration:none;
    color:#cccccc;
    font-style:italic;
}

.options a:hover{
    text-decoration:underline;
}


.login-btn{
    width:182px;
    height:35px;

    border:none;
    cursor:pointer;

    background:rgba(29, 24, 54, 0.82);

    color:#ffffff;

    font-size:13px;
    letter-spacing:0.3px;

    transition:0.3s;
}

.login-btn:hover{
    background:#171233;
}

</style>
</head>

<body>

<div class="login-box">

    <div class="avatar"></div>

    <div class="input-group">
        <i class="fa-solid fa-user"></i>
        <input type="text" placeholder="Username">
    </div>

    
    <div class="input-group">
        <i class="fa-solid fa-lock"></i>
        <input type="password" placeholder="Password">
    </div>

  
    <div class="options">

        <label>
            <input type="checkbox">
            Remember me
        </label>

        <a href="#">Forgot Password?</a>

    </div>

    
    <button class="login-btn">LOGIN</button>

</div>

</body>
</html>
